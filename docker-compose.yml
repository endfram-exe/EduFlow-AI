services:
  mysql:
    image: mysql:8.4
    container_name: eduflow-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eduflow}
      MYSQL_USER: ${MYSQL_USER:-eduflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eduflow_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: eduflow-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-eduflow}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-eduflow}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-eduflow_password}
      EDUFLOW_SECURITY_JWT_SECRET: ${JWT_SECRET:-change-this-secret-to-a-strong-256-bit-production-value}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: eduflow-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "5173:80"

volumes:
  mysql-data:
